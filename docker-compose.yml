version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: library_db
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: library_app
    environment:
      DATABASE_URL: postgresql://library_user:library_pass@db:5432/library_db
      FLASK_ENV: development
      FLASK_APP: app.py
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
    depends_on:
      db:
        condition: service_healthy
    command: flask run --host=0.0.0.0

  nginx:
    image: nginx:alpine
    container_name: library_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: library_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@library.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
